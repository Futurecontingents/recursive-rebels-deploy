<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recursive Rebels Housing Prototype</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <!--
    Recursive Rebels frontend prototype.

    Current status update:
    - The page is already split into separate files so the prototype is easier to maintain.
    - The UI layer, demo data, styles, and map logic are separated.
    - Demo data is only temporary and is shaped around the current backend/database draft.
    
    - Refined accessibility behavior with better high contrast and text scaling options
    - More dynamic marker and popups behavior included
    - final synchronisation with backend/API data
  -->

  <div class="layout">
    <aside class="panel left-panel">
      <h1>Recursive Rebels</h1>
      <p class="subtitle">Dubai housing prototype</p>

      <div class="control-group">
        <label for="maxPrice">Max price (AED)</label>
        <input id="maxPrice" type="number" value="10000000" />
      </div>

      <div class="control-group">
        <label for="minTransitScore">Min transit score</label>
        <input id="minTransitScore" type="number" value="0" min="0" max="100" />
      </div>

      <div class="control-group">
        <label for="maxDistance">Max distance to nearest transit (m)</label>
        <input id="maxDistance" type="number" value="2000" />
      </div>

      <div class="control-group">
        <label>Property type</label>
        <div class="property-type-group">
          <label class="property-type-option">
            <input type="checkbox" class="propertyTypeCheckbox" value="Studio" checked />
            <span>Studio</span>
          </label>
          <label class="property-type-option">
            <input type="checkbox" class="propertyTypeCheckbox" value="1BR" checked />
            <span>1BR</span>
          </label>
          <label class="property-type-option">
            <input type="checkbox" class="propertyTypeCheckbox" value="2BR" checked />
            <span>2BR</span>
          </label>
          <label class="property-type-option">
            <input type="checkbox" class="propertyTypeCheckbox" value="3BR+" checked />
            <span>3BR+</span>
          </label>
        </div>
      </div>

      <div class="checkbox-row">
        <input id="accessibleOnly" type="checkbox" />
        <label for="accessibleOnly" class="inline-label">Accessible only</label>
      </div>

      <div class="checkbox-row">
        <input id="highContrast" type="checkbox" />
        <label for="highContrast" class="inline-label">High contrast</label>
      </div>

      <div class="control-group">
        <label for="textSize">Text size</label>
        <select id="textSize">
          <option value="0.9">Small</option>
          <option value="1"selected>Default</option>
          <option value="1.1">Large</option>
          <option value="1.25">Extra large</option>
        </select>
      </div>

      <div class="button-row">
        <button id="applyFiltersBtn">Apply filters</button>
        <button id="resetFiltersBtn" class="secondary-btn">Reset</button>
      </div>

      <div class="results-count" id="resultsCount">Results: 0</div>

      <div id="resultsList"></div>

      <div class="legend">
        <h3>Score legend</h3>
        <div class="legend-item"><span class="dot green"></span> 80-100 good transit score</div>
        <div class="legend-item"><span class="dot orange"></span> 50-79 medium transit score</div>
        <div class="legend-item"><span class="dot red"></span> 0-49 low transit score</div>
      </div>
    </aside>

    <main id="map"></main>

    <aside class="panel right-panel">
      <h2>Listing details</h2>
      <div id="detailsContainer" class="details-empty">
        Select a property from the map or from the results list.
      </div>
    </aside>
  </div>

  <script src="{{ url_for('static', filename='map.js') }}"></script>
  <script src="{{ url_for('static', filename='ui.js') }}"></script>

</body>
</html>
